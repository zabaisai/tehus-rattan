version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: tehus_postgres
    restart: always
    environment:
      POSTGRES_USER: tehus_user
      POSTGRES_PASSWORD: tehus_pass
      POSTGRES_DB: tehus_rattan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: tehus_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tehus.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: